  category: "preposition"
  description: "Arabic conjunctions and connectors (و, ف, ثم, أو, لكن) are typically dropped in ArSL. Sequential actions are shown through temporal sequencing of signs rather than explicit connectors."
  trigger: "Token is identified as a conjunction (و, ف, ثم, أو, لكن, بل)."
  action: "Remove the conjunction from the gloss sequence. If the conjunction connects two clauses, treat each clause independently."
