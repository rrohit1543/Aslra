# =============================================================================
# WORD ORDER RULES
# =============================================================================

- id: "R-01"
  name: "Topic-Comment Word Order"
  category: "word_order"
  description: "ArSL follows a Topic-Comment structure where the subject or topic is established first, followed by the comment (verb/action/description). This contrasts with Arabic's typical VSO order."
  trigger: "Any declarative sentence. Applied after time fronting and other restructuring rules."
  action: "Reorder the sentence to place the subject/topic first, then the object/location, then the verb. General pattern: S-O-V or Topic-Comment."
  evidence_type: "explicit"
  evidence:
    - source_id: "S-08"
      page_or_section: "Section: ترتيب عناصر الجملة"
      quote_or_summary: "يميل تركيب الجملة الإشارية إلى وضع الفاعل أو الموضوع الأساسي أولاً، ثم الفعل أو الحالة. مثال: 'ذهب الولد إلى المدرسة' → 'ولد + مدرسة + ذهب'"
    - source_id: "S-01"
      page_or_section: "Section 3: Linguistic Features"
      quote_or_summary: "ArSL uses Topic-Comment structure. The topic is established first, followed by the comment about that topic."
    - source_id: "S-03"
      page_or_section: "Section 3: Preprocessing Pipeline"
      quote_or_summary: "Word order reordering is performed based on POS tags to convert Arabic VSO/SVO to ArSL topic-comment structure."
    - source_id: "S-02"
      page_or_section: "Chapter 4: Translation Approach"
      quote_or_summary: "Direct word-for-word translation fails for ArSL. The system must restructure sentence order."
  confidence: "high"
  priority: 5
  examples:
    - input: "ذهب الطالب إلى المدرسة"
      output: "طالب / مدرسة / ذهب"
      explanation: "Step 1: Identify subject (الطالب), destination (المدرسة), verb (ذهب). Step 2: Drop article (ال) from الطالب and المدرسة. Step 3: Drop preposition (إلى). Step 4: Reorder to Topic-Comment: طالب + مدرسة + ذهب."
    - input: "أكل أحمد التفاحة"
      output: "أحمد / تفاحة / أكل"
      explanation: "Step 1: Identify subject (أحمد), object (التفاحة), verb (أكل). Step 2: Drop article. Step 3: Reorder to S-O-V."
  notes: "ArSL word order is flexible and context-dependent. Topic-Comment is the default but SVO is also acceptable. The exact order may vary by regional variant and discourse context. This rule represents the most commonly documented pattern."
  requires_expert_review: true
  review_questions:
    - "Is SOV or SVO the more common order in everyday ArSL usage?"
    - "Does the topic-comment structure apply equally across all regional variants?"
    - "Are there sentence types where VSO (Arabic order) is retained in ArSL?"

# =============================================================================
# TIME EXPRESSION RULES
# =============================================================================

- id: "R-02"
  name: "Time Expression Fronting"
  category: "time"
  description: "Temporal expressions (yesterday, tomorrow, now, last week, etc.) are moved to the beginning of the gloss sequence to establish the time frame before the action."
  trigger: "Sentence contains a time expression (adverb of time) in any position."
  action: "Move the time expression to the front of the gloss sequence, before the subject."
  evidence_type: "explicit"
  evidence:
    - source_id: "S-08"
      page_or_section: "Section: التركيب الزماني والمكاني"
      quote_or_summary: "قد يتم تقديم 'الوقت' أو 'الموضوع' في بداية الجملة لتحديد سياق الحديث قبل ذكر الفاعل أو الفعل"
    - source_id: "S-03"
      page_or_section: "Section 3.2: Reordering Rules"
      quote_or_summary: "Time markers are placed at the beginning of the sign sequence to set the temporal context."
    - source_id: "S-02"
      page_or_section: "Chapter 4"
      quote_or_summary: "Temporal adverbs are fronted in the ArSL translation output."
  confidence: "high"
  priority: 1
  examples:
    - input: "ذهب الطالب إلى المدرسة أمس"
      output: "أمس / طالب / مدرسة / ذهب"
      explanation: "Step 1: Identify time expression (أمس = yesterday). Step 2: Move أمس to front. Step 3: Apply word order rule for remaining: طالب + مدرسة + ذهب."
    - input: "سأشتري ثلاثة كتب غداً"
      output: "غداً / ثلاثة / كتاب / شراء"
      explanation: "Step 1: Identify time expression (غداً = tomorrow). Step 2: Move to front. Step 3: Extract future tense from سأشتري → شراء. Step 4: Reorder remaining elements."
  notes: "Time fronting is one of the most well-documented ArSL rules. It is consistent across most sign language typology research. When both time and topic compete for the front position, time typically comes first."
  requires_expert_review: false
  review_questions:
    - "When multiple time expressions exist in a sentence, what is the ordering?"

# =============================================================================
# NEGATION RULES
# =============================================================================

- id: "R-03"
  name: "Negation Handling"
  category: "negation"
  description: "Negation in ArSL is expressed by adding a negation sign (typically a headshake or a specific hand sign) after the verb, or at the end of the clause. Arabic negation particles (لا, لم, لن, ما, ليس) are replaced with a single negation marker."
  trigger: "Sentence contains an Arabic negation particle (لا, لم, لن, ما, ليس, لست, etc.)."
  action: "Remove the Arabic negation particle. Add a negation sign gloss (لا/NEG) at the end of the verb phrase or at the end of the clause. Non-manual marker (headshake) is implied."
  evidence_type: "inferred"
  evidence:
    - source_id: "S-08"
      page_or_section: "Section: الاستفهام والنفي"
      quote_or_summary: "الجملة المنفية تعتمد على تعبيرات الوجه وإضافة إشارة النفي"
    - source_id: "S-01"
      page_or_section: "Section 3"
      quote_or_summary: "Non-manual markers including headshake are used for negation in ArSL, similar to other sign languages."
    - source_id: "S-02"
      page_or_section: "Chapter 4: Negation handling"
      quote_or_summary: "Negation particles in Arabic are replaced with negation signs in the ArSL output."
  confidence: "medium"
  priority: 2
  examples:
    - input: "لم يذهب أحمد إلى المدرسة"
      output: "أحمد / مدرسة / ذهب / لا"
      explanation: "Step 1: Remove negation particle (لم). Step 2: Extract verb base (يذهب → ذهب). Step 3: Reorder to topic-comment: أحمد + مدرسة + ذهب. Step 4: Add negation sign (لا) at end."
    - input: "لا أريد"
      output: "أريد / لا"
      explanation: "Step 1: Remove لا. Step 2: Keep verb. Step 3: Add negation at end."
  notes: "The exact position of the negation sign (post-verb vs. clause-final) may vary by regional variant. Some signers place it immediately after the verb, others at the very end. Headshake is the primary non-manual negation marker. Multiple Arabic negation particles (لم, لن, لا, ما, ليس) all map to a single negation sign in ArSL."
  requires_expert_review: true
  review_questions:
    - "Is the negation sign placed immediately after the verb or at the end of the clause?"
    - "Do different Arabic negation particles (لم vs لا vs لن) have different ArSL representations?"
    - "Is headshake sufficient for negation without a manual sign?"

# =============================================================================
# QUESTION RULES
# =============================================================================

- id: "R-04"
  name: "WH-Question Formation"
  category: "question"
  description: "WH-question words (أين, ماذا, من, متى, كيف, لماذا, كم) are placed at the end of the gloss sequence in ArSL. Non-manual markers (raised eyebrows for WH, furrowed brows for yes/no) accompany the question."
  trigger: "Sentence contains a WH-question word or ends with a question mark."
  action: "Move the WH-question word to the end of the gloss sequence. Mark with non-manual marker notation."
  evidence_type: "inferred"
  evidence:
    - source_id: "S-08"
      page_or_section: "Section: الاستفهام"
      quote_or_summary: "غالباً ما تُستخدم إيماءات الوجه (مثل رفع الحاجبين أو حركة الرأس) كعلامة ترقيم إشارية توضع في بداية الجملة أو نهايتها لتحديد صيغة السؤال"
    - source_id: "S-01"
      page_or_section: "Section 3: Syntax"
      quote_or_summary: "Question formation in sign languages typically involves non-manual markers and specific positioning of question words."
  confidence: "medium"
  priority: 3
  examples:
    - input: "أين تعمل؟"
      output: "عمل / أين"
      explanation: "Step 1: Identify WH-word (أين = where). Step 2: Extract verb (تعمل → عمل). Step 3: Place WH-word at end. Non-manual: furrowed eyebrows."
    - input: "ماذا تريد؟"
      output: "تريد / ماذا"
      explanation: "Step 1: Identify WH-word (ماذا = what). Step 2: Move to end."
    - input: "متى ستسافر؟"
      output: "سفر / متى"
      explanation: "Step 1: Identify WH-word (متى = when). Step 2: Extract verb base (سفر). Step 3: WH-word at end."
  notes: "Some sources indicate WH-words can appear at both the beginning AND end of the clause (WH-doubling). The end position is more commonly documented. Yes/no questions use different non-manual markers (raised eyebrows) vs. WH-questions (furrowed brows). This distinction is important but cannot be represented in gloss text alone."
  requires_expert_review: true
  review_questions:
    - "Is WH-word doubling (appearing both at start and end) common in ArSL?"
    - "Is the question word always clause-final, or are there exceptions?"
    - "Do all regional variants handle WH-questions the same way?"

- id: "R-04b"
  name: "Yes/No Question Formation"
  category: "question"
  description: "Yes/No questions in ArSL maintain the same word order as declarative sentences but are marked by non-manual signals (raised eyebrows, forward head tilt). The particle هل is dropped."
  trigger: "Sentence contains yes/no question marker (هل) or is a declarative sentence with question mark."
  action: "Remove هل if present. Keep declarative word order. Add non-manual marker notation."
  evidence_type: "inferred"
  evidence:
    - source_id: "S-08"
      page_or_section: "Section: الاستفهام"
      quote_or_summary: "Raised eyebrows used for yes/no question indication."
    - source_id: "S-01"
      page_or_section: "Section 3"
      quote_or_summary: "Yes/no questions in sign languages are marked primarily through non-manual features rather than word order changes."
  confidence: "medium"
  priority: 3
  examples:
    - input: "هل أنت طالب؟"
      output: "أنت / طالب [+NMM:سؤال]"
      explanation: "Step 1: Remove هل. Step 2: Keep word order. Step 3: Mark as question via non-manual markers."
  notes: "Yes/no questions are primarily distinguished from statements through non-manual markers (raised eyebrows, forward lean), which cannot be fully captured in text gloss."
  requires_expert_review: true
  review_questions:
    - "Are there any manual signs used for yes/no question marking in addition to non-manual markers?"

# =============================================================================
# PRONOUN RULES
# =============================================================================

- id: "R-05"
  name: "Pronoun Simplification"
  category: "pronoun"
  description: "Arabic distinguishes many pronoun forms (gender, number, case). ArSL uses a simplified pointing system. All Arabic pronoun variants for the same person are mapped to a single pointing sign."
  trigger: "Token is identified as a pronoun (أنا, أنت, أنتِ, هو, هي, نحن, أنتم, هم, etc.)."
  action: "Replace Arabic pronoun with the base pronoun sign. ArSL uses pointing (index finger) to indicate person: self-point for first person, forward-point for second person, side-point for third person."
  evidence_type: "inferred"
  evidence:
    - source_id: "S-01"
      page_or_section: "Section 3: Morphology"
      quote_or_summary: "ArSL does not use the same agreement markers (singular/plural/dual) found in spoken Arabic. Pronouns are typically expressed through pointing."
    - source_id: "S-06"
      page_or_section: "Morphology section"
      quote_or_summary: "Sign languages use spatial indexing (pointing) for pronominal reference rather than distinct lexical forms."
  confidence: "medium"
  priority: 4
  examples:
    - input: "هو ذهب"
      output: "هو / ذهب"
      explanation: "Pronoun هو is signed as a point to the side (third person). Verb follows."
    - input: "أنا أحب القراءة"
      output: "أنا / قراءة / حب"
      explanation: "Self-point (أنا), then topic (قراءة), then verb (حب)."
  notes: "Arabic verb conjugation already encodes the subject pronoun. When a sentence has an explicit pronoun AND a conjugated verb, the pronoun sign may be optional if the verb's subject is clear from context. Dual forms (أنتما, هما) are particularly rare in ArSL — typically represented as pointing to two people."
  requires_expert_review: true
  review_questions:
    - "When Arabic uses embedded pronouns in verb conjugation (e.g., ذهبت), should we insert an explicit pronoun sign?"
    - "How are dual pronouns handled in ArSL?"

