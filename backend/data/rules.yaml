# PREPOSITION RULES
# =============================================================================

- id: "R-06"
  name: "Preposition Dropping and Spatial Encoding"
  category: "preposition"
  description: "Many Arabic prepositions (إلى, في, من, على, بـ, لـ, عن) are dropped in ArSL because spatial relationships are expressed through sign movement, location, and direction rather than separate preposition signs."
  trigger: "Token is identified as a preposition."
  action: "Remove the preposition from the gloss sequence. The spatial meaning is conveyed through the movement/direction of surrounding signs."
  evidence_type: "explicit"
  evidence:
    - source_id: "S-08"
      page_or_section: "Section: ترتيب عناصر الجملة"
      quote_or_summary: "في كثير من الأحيان، يتم اختصار أو حذف حروف الجر، وحروف العطف، وأدوات التعريف التي لا تؤثر على المعنى الجوهري للجملة"
    - source_id: "S-03"
      page_or_section: "Section 3: Stop word removal"
      quote_or_summary: "Prepositions are among the function words removed during preprocessing for ArSL translation."
    - source_id: "S-02"
      page_or_section: "Chapter 4"
      quote_or_summary: "Arabic prepositions do not have direct sign equivalents; spatial information is encoded in sign movement."
  confidence: "high"
  priority: 2
  examples:
    - input: "ذهب إلى المدرسة"
      output: "مدرسة / ذهب"
      explanation: "Preposition إلى is dropped. Direction is implied by the movement of the sign for ذهب."
    - input: "الكتاب على الطاولة"
      output: "طاولة / كتاب / فوق"
      explanation: "Preposition على is dropped as a word but the spatial relationship is shown through sign placement (signing 'book' above 'table')."
  notes: "Not all prepositions are always dropped. Some signers retain preposition-like signs for emphasis or clarity. The rule is a strong tendency, not an absolute. Spatial prepositions (على, تحت, فوق) may have dedicated signs in some contexts."
  requires_expert_review: true
  review_questions:
    - "Which specific prepositions have dedicated ArSL signs vs. which are always dropped?"
    - "How does the signer convey 'from' vs. 'to' without preposition signs?"

# =============================================================================
# ARTICLE RULES
# =============================================================================

- id: "R-07"
  name: "Definite Article (الـ) Dropping"
  category: "article"
  description: "The Arabic definite article (الـ) is stripped from all words. ArSL does not use articles — definiteness is understood from context. The ALECSO unified dictionary lists all words in their indefinite/lemma form."
  trigger: "Any word beginning with the definite article الـ."
  action: "Remove the الـ prefix from the word. Use the bare noun/adjective form for gloss lookup."
  evidence_type: "explicit"
  evidence:
    - source_id: "S-08"
      page_or_section: "Section: ترتيب عناصر الجملة"
      quote_or_summary: "يتم اختصار أو حذف ... أدوات التعريف التي لا تؤثر على المعنى الجوهري للجملة"
    - source_id: "S-04"
      page_or_section: "Dictionary format"
      quote_or_summary: "All entries in the ALECSO dictionary are listed in base/lemma form without the definite article."
    - source_id: "S-03"
      page_or_section: "Section 3.1: Normalization"
      quote_or_summary: "Definite articles are removed during the preprocessing step before gloss lookup."
    - source_id: "S-10"
      page_or_section: "Section: Linguistic Features"
      quote_or_summary: "Sign languages generally do not use articles (the, a). Definiteness is conveyed through context."
  confidence: "high"
  priority: 1
  examples:
    - input: "الكتاب"
      output: "كتاب"
      explanation: "Remove الـ prefix → كتاب."
    - input: "المدرسة"
      output: "مدرسة"
      explanation: "Remove الـ prefix → مدرسة."
    - input: "ذهب الطالب إلى المدرسة"
      output: "(الطالب → طالب, المدرسة → مدرسة)"
      explanation: "Both definite articles are stripped before further processing."
  notes: "This is one of the most consistent and well-documented rules across all sources. It applies universally regardless of regional variant. The solar/lunar letter distinction (الشمسية/القمرية) does not affect this rule — الـ is always removed."
  requires_expert_review: false
  review_questions: []

# =============================================================================
# VERB TENSE RULES
# =============================================================================

- id: "R-08"
  name: "Verb Tense Simplification"
  category: "tense"
  description: "Arabic encodes tense through verb conjugation and prefixes (سـ for future, لم for past negation, etc.). In ArSL, the verb is typically signed in its base/root form, and tense is conveyed by a separate time marker sign or by a time expression already fronted in the sentence."
  trigger: "Verb token has tense/conjugation markers (past conjugation, present prefix يـ/تـ/أـ/نـ, future prefix سـ/سوف)."
  action: "Extract the verb root/lemma. If future marker (سـ/سوف) is present, add a future time sign if no explicit time expression already exists. Past tense is typically conveyed by the time expression (e.g., أمس) rather than a separate tense marker."
  evidence_type: "inferred"
  evidence:
    - source_id: "S-03"
      page_or_section: "Section 3: Morphological Analysis"
      quote_or_summary: "Verb stems are extracted through morphological analysis. Tense information is handled separately from the verb sign."
    - source_id: "S-01"
      page_or_section: "Section 3: Morphology"
      quote_or_summary: "ArSL does not use the same tense, aspect, or agreement markers found in spoken Arabic."
    - source_id: "S-07"
      page_or_section: "System Design"
      quote_or_summary: "Verbs are reduced to base form. Tense context is established by time expressions."
  confidence: "medium"
  priority: 3
  examples:
    - input: "سأشتري"
      output: "مستقبل / شراء"
      explanation: "Step 1: Identify future prefix سـ. Step 2: Extract verb root شراء (or اشترى → شراء). Step 3: Add future time marker if no time adverb exists."
    - input: "ذهبت أمس"
      output: "أمس / ذهب"
      explanation: "Step 1: Extract verb root ذهب from ذهبت. Step 2: Time expression أمس already provides past context, so no additional tense marker needed."
  notes: "The exact mechanism for tense marking in ArSL is debated. Some sources suggest dedicated 'PAST', 'FUTURE' signs exist, while others say time expressions handle all tense marking. In our implementation, we add an explicit tense marker only when no time adverb is present in the sentence."
  requires_expert_review: true
  review_questions:
    - "Are there dedicated PAST/PRESENT/FUTURE signs in ArSL, or is tense always contextual?"
    - "When a sentence has both a time adverb and verb conjugation, is the time marker redundant?"

# =============================================================================
# ADJECTIVE RULES
# =============================================================================

- id: "R-09"
  name: "Adjective Placement After Noun"
  category: "adjective"
  description: "In ArSL, adjectives follow the noun they modify, similar to Arabic. However, the adjective is signed in its base form (masculine singular) without agreement markers."
  trigger: "Token sequence contains a noun followed by an adjective."
  action: "Keep the noun-adjective order. Remove any gender/number agreement suffixes from the adjective. Sign the adjective in its base form."
  evidence_type: "inferred"
  evidence:
    - source_id: "S-08"
      page_or_section: "Section: بنية الجملة"
      quote_or_summary: "Adjectives and descriptors follow the noun in ArSL sentence structure."
    - source_id: "S-03"
      page_or_section: "Section 3: POS-based reordering"
      quote_or_summary: "Noun-adjective pairs are kept together with the adjective following the noun."
    - source_id: "S-12"
      page_or_section: "Basic sentence construction"
      quote_or_summary: "Descriptive signs (adjectives) are placed after the thing being described."
  confidence: "medium"
  priority: 6
  examples:
    - input: "هذا الكتاب جميل جداً"
      output: "هذا / كتاب / جميل / جداً"
      explanation: "Step 1: Demonstrative (هذا) stays at front. Step 2: Drop article from الكتاب → كتاب. Step 3: Adjective (جميل) follows noun. Step 4: Intensifier (جداً) follows adjective."
    - input: "البيت الكبير"
      output: "بيت / كبير"
      explanation: "Drop article. Keep noun-adjective order."
  notes: "This mirrors Arabic word order (noun-adjective), so minimal restructuring is needed. The key transformation is removing agreement morphology from the adjective."
  requires_expert_review: false
  review_questions:
    - "Are there cases where the adjective precedes the noun in ArSL for emphasis?"

