  action: "Reorder to: Demonstrative + Noun + Possessive + Adjective. Drop articles and case markers."
  evidence_type: "inferred"
  evidence:
    - source_id: "S-08"
      page_or_section: "Section: بنية الجملة"
      quote_or_summary: "Topic-comment structure applies within noun phrases as well — the main noun is established first."
    - source_id: "S-03"
