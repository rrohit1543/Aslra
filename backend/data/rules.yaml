- id: "R-13"
  name: "Fingerspelling Fallback for Unknown Words"
  category: "fallback"
  description: "When a word is not found in the sign dictionary, it should be fingerspelled using the Arabic manual alphabet. This is standard practice for proper nouns, technical terms, and new vocabulary."
  trigger: "Word lookup in dictionary returns no match AND word is not a function word (preposition, article, etc.)."
  action: "Mark the word for fingerspelling by wrapping it in fs() notation: fs(word). The frontend can display this distinctly."
  evidence_type: "explicit"
  evidence:
