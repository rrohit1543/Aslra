  category: "number"
  description: "In ArSL, numbers precede the noun they quantify. The noun is typically signed in singular form regardless of the number."
  trigger: "Token sequence contains a number followed by or preceding a noun."
  action: "Place the number sign before the noun sign. Use the singular form of the noun."
  evidence_type: "inferred"
  evidence:
    - source_id: "S-03"
      page_or_section: "Section 3: Number handling"
      quote_or_summary: "Numerical expressions are restructured with the number preceding the noun in the sign output."
    - source_id: "S-12"
      page_or_section: "Numbers section"
      quote_or_summary: "Number signs are taught alongside nouns with number-first ordering."
  confidence: "medium"
  priority: 4
  examples:
    - input: "ثلاثة كتب"
      output: "ثلاثة / كتاب"
      explanation: "Number (ثلاثة) precedes noun (كتاب, in singular form). Arabic plural كتب → singular كتاب."
    - input: "خمسة طلاب"
      output: "خمسة / طالب"
      explanation: "Number first, noun in singular: طلاب → طالب."
